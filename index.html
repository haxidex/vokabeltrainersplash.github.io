<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vokabeltrainer TEST</title>

<style>
body {
  background:#0b1020;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}
button {
  padding:15px 20px;
  font-size:18px;
  margin:10px;
  border-radius:10px;
  border:none;
}
.test {
  background:#ff3b3b;
  font-size:22px;
  padding:10px;
  border-radius:10px;
}
.ok {
  background:#2ecc71;
}
</style>
</head>

<body>

<h1 class="test">🚨 IPAD AUDIO SESSION TEST 🚨</h1>

<p>Wenn du das siehst → richtige Datei geladen ✅</p>

<button onclick="startAudio()" class="ok">
▶ Audio starten
</button>

<button onclick="startiPadAudio()" class="ok">
📱 iPad Audio-Session
</button>

<script>
function startAudio() {
  const audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
  audio.play();
}

function startiPadAudio() {
  const audio = new Audio();
  audio.src = "data:audio/mp3;base64,//uQxAAAA...";
  audio.loop = true;
  audio.volume = 0.01;

  audio.play().then(()=>{
    alert("iPad Audio Session AKTIV ✅");
  }).catch(e=>{
    alert("Fehler: " + e);
  });
}
</script>

</body>
</html>
